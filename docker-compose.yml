
services:

  database:
    image: mysql:8.0
    container_name: contacts-database
    restart: unless-stopped

    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}

    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

    ports:
      - "3308:3306"

    networks:
      - backend-net

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  backend:
    build: ./backend
    container_name: contacts-backend
    restart: unless-stopped

    ports:
      - "3000:3000"

    environment:
      DB_HOST: database
      DB_PORT: 3306
      DB_USER: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      PORT: 3000

    depends_on:
      - database
        
    networks:
      - backend-net
      - frontend-net

    

  frontend:
    build: ./frontend
    container_name: contacts-frontend
    restart: unless-stopped

    ports:
      - "8081:8081"

    environment:
      - API_URL=http://backend:3000

    depends_on:
      backend:
        condition: service_healthy

    networks:
      - frontend-net

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge

volumes:
  mysql-data:
    driver: local